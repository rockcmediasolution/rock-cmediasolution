<script>
        const SPREADSHEET_ID = '1fzL5DzEemQ_BTQgkHFLaCG-7ZjQlEFknZw5SN44gm-Q';
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

        // 🔥 नयाँ जादु: यसले पुरानो (?id=11) र नयाँ (/news/11) दुवै लिङ्कबाट आइडी तान्छ
        const urlParams = new URLSearchParams(window.location.search);
        let idString = urlParams.get('id');
        
        // यदि ?id भेटिएन भने, नयाँ छोटो लिङ्कबाट तान्ने
        if (!idString) {
            const pathParts = window.location.pathname.split('/');
            idString = pathParts[pathParts.length - 1]; 
        }
        
        const newsId = parseInt(idString);

        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function loadNewsDetail() {
            const container = document.getElementById('main-content');
            
            Papa.parse(url, {
                download: true,
                header: false,
                complete: function(results) {
                    const rows = results.data;

                    if (isNaN(newsId) || newsId >= rows.length || !rows[newsId]) {
                        container.innerHTML = '<p class="loading-text" style="color:red;">समाचार भेटिएन।</p>';
                        return;
                    }

                    const currentNews = rows[rows.length - 1 - (rows.length - 1 - newsId)]; 
                    const date = rows[newsId][0] ? rows[newsId][0].trim() : '';
                    const title = rows[newsId][1] ? rows[newsId][1].trim() : '';
                    const desc = rows[newsId][2] ? rows[newsId][2].trim() : '';
                    const mediaLink = rows[newsId][3] ? rows[newsId][3].trim() : '';

                    let mediaHtml = '';
                    if (mediaLink) {
                        const ytId = getYouTubeId(mediaLink);
                        if (ytId) {
                            mediaHtml = `<div class="media-container"><iframe src="https://www.youtube.com/embed/${ytId}" frameborder="0" allowfullscreen></iframe></div>`;
                        } else {
                            mediaHtml = `<div class="media-container"><img src="${mediaLink}" alt="News Media"></div>`;
                        }
                    }

                    // सुझाव खण्ड (रिभर्स लुप)
                    let suggestionsHtml = '';
                    let count = 0;
                    for (let i = rows.length - 1; i >= 1; i--) {
                        if (i === newsId) continue;
                        const row = rows[i];
                        if (row && row[1] && row[1].trim()) {
                            // 🔥 यहाँ पनि 'यो पनि पढ्नुहोस' मा नयाँ छोटो लिङ्क (/news/) राखिएको छ 
                            suggestionsHtml += `<a href="/news/${i}" class="suggested-item"><i class="fa-solid fa-chevron-right" style="font-size:0.7rem; color:#b8860b;"></i> ${row[1].trim()}</a>`;
                            count++;
                            if (count >= 4) break; 
                        }
                    }

                    container.innerHTML = `
                        <span class="news-date"><i class="fa-regular fa-clock"></i> ${date}</span>
                        <h1>${title}</h1>
                        ${mediaHtml}
                        <div class="news-content">${desc}</div>
                        
                        <div class="follow-notice-box">
                            <p>सूचना, मनोरञ्जन र डिजिटल सेवाका लागि ROCK C Media Solution लाई Follow गर्न नभुल्नुहोस्।</p>
                            <div class="social-icons-row">
                                <a href="https://facebook.com/Rockcmedia" target="_blank" class="social-icon-btn btn-facebook" title="Facebook Page"><i class="fab fa-facebook-f"></i></a>
                                <a href="https://wa.me/9779811661522" target="_blank" class="social-icon-btn btn-whatsapp" title="WhatsApp Chat"><i class="fab fa-whatsapp"></i></a>
                                <a href="mailto:rockcmediasolution@gmail.com" class="social-icon-btn btn-email" title="Send Email"><i class="fas fa-envelope"></i></a>
                                <a href="https://youtube.com/@Rock-CMediaSolution" target="_blank" class="social-icon-btn btn-youtube" title="YouTube Channel"><i class="fab fa-youtube"></i></a>
                            </div>
                        </div>

                        <section class="suggestions-section">
                            <h3>यो पनि पढ्नुहोस</h3>
                            ${suggestionsHtml || '<p style="color:#7f8c8d;">अन्य समाचार उपलब्ध छैन।</p>'}
                        </section>
                    `;
                },
                error: function(err) {
                    console.error(err);
                    container.innerHTML = '<p class="loading-text" style="color:red;">विवरण लोड गर्दा प्राविधिक त्रुटि भयो।</p>';
                }
            });
        }
        document.addEventListener('DOMContentLoaded', loadNewsDetail);
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Details - ROCK-C Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* 🎨 CSS Variables: डिफल्टमा Light Mode */
        :root {
            --bg-color: #f5f6f8;
            --text-color: #1a1a1a;
            --card-bg: #ffffff;
            --card-border: #e0e0e0;
            --text-muted: #666666;
            --header-bg: #000000;
        }

        /* 🌙 Dark Mode */
        body.dark-mode {
            --bg-color: #0b0b0b;
            --text-color: #f1f1f1;
            --card-bg: #141414;
            --card-border: #252525;
            --text-muted: #888888;
            --header-bg: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', Arial, sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg-color); color: var(--text-color); line-height: 1.6; }
        
        header { 
            background: var(--header-bg); padding: 15px 40px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #ffd700; position: sticky; top: 0; z-index: 100;
        }
        .logo { max-width: 140px; width: 100%; height: auto; }

        .theme-toggle-btn {
            background: #222; color: #ffd700; border: 1px solid #ffd700;
            padding: 8px 15px; border-radius: 20px; cursor: pointer;
            font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 8px;
        }
        .theme-toggle-btn:hover { background: #ffd700; color: #000; }

        .back-btn { display: inline-block; margin: 20px auto; padding: 10px 20px; background: #222; color: #ffd700; text-decoration: none; border-radius: 5px; border: 1px solid #ffd700; transition: 0.3s; }
        .back-btn:hover { background: #ffd700; color: #000; }

        .detail-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .news-date { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; display: block; }
        .detail-container h1 { color: var(--text-color); font-size: 2.2rem; margin-bottom: 20px; line-height: 1.3; font-weight: 700; }
        .news-content { color: var(--text-color); opacity: 0.9; font-size: 1.15rem; margin-bottom: 30px; white-space: pre-wrap; text-align: justify; }
        
        .media-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; margin-bottom: 30px; background: #000; border: 1px solid var(--card-border); }
        .media-container iframe, .media-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }

        /* सुझाव सेक्सन स्टाइल */
        .suggestions-section { margin-top: 50px; border-top: 2px solid #ffd700; padding-top: 30px; }
        .suggestions-section h3 { color: #ffd700; font-size: 1.5rem; margin-bottom: 20px; }
        .suggested-item { display: block; color: var(--text-color); opacity: 0.8; text-decoration: none; padding: 12px 0; border-bottom: 1px dashed var(--card-border); font-size: 1.1rem; transition: 0.2s; }
        .suggested-item:hover { color: #ffd700; opacity: 1; padding-left: 5px; }

        .loading-text { text-align: center; color: #ffd700; padding: 50px; }
        @media (max-width: 600px) { header { padding: 15px 20px; } .detail-container h1 { font-size: 1.7rem; } }
    </style>
</head>
<body>

    <header>
        <img src="ROCK C MEDIA SOLUTION NEW LOGO.png" alt="ROCK-C Media Solution" class="logo">
        <button class="theme-toggle-btn" id="theme-toggle">
            <i class="fa-solid fa-moon"></i> <span>Dark Mode</span>
        </button>
    </header>

    <div style="max-width: 800px; margin: 0 auto; padding: 0 20px;">
        <a href="news.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> सबै समाचारहरू</a>
    </div>

    <main class="detail-container" id="main-content">
        <p class="loading-text"><i class="fas fa-spinner fa-spin"></i> समाचार लोड हुँदैछ...</p>
    </main>

    <script>
        const SPREADSHEET_ID = '1fzL5DzEemQ_BTQgkHFLaCG-7ZjQlEFknZw5SN44gm-Q';
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

        const urlParams = new URLSearchParams(window.location.search);
        const newsId = parseInt(urlParams.get('id'));

        // 🌗 थिम सिङ्क र व्यवस्थापन
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = themeToggleBtn.querySelector('i');
        const themeText = themeToggleBtn.querySelector('span');

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fa-solid fa-sun';
            themeText.innerText = 'Light Mode';
        }

        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                themeIcon.className = 'fa-solid fa-sun';
                themeText.innerText = 'Light Mode';
            } else {
                localStorage.setItem('theme', 'light');
                themeIcon.className = 'fa-solid fa-moon';
                themeText.innerText = 'Dark Mode';
            }
        });

        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function loadNewsDetail() {
            const container = document.getElementById('main-content');
            
            Papa.parse(url, {
                download: true,
                header: false,
                complete: function(results) {
                    const rows = results.data;

                    if (isNaN(newsId) || newsId >= rows.length || !rows[newsId]) {
                        container.innerHTML = '<p class="loading-text" style="color:red;">समाचार भेटिएन।</p>';
                        return;
                    }

                    const currentNews = rows[newsId];
                    const date = currentNews[0] ? currentNews[0].trim() : '';
                    const title = currentNews[1] ? currentNews[1].trim() : '';
                    const desc = currentNews[2] ? currentNews[2].trim() : '';
                    const mediaLink = currentNews[3] ? currentNews[3].trim() : '';

                    let mediaHtml = '';
                    if (mediaLink) {
                        const ytId = getYouTubeId(mediaLink);
                        if (ytId) {
                            mediaHtml = `<div class="media-container"><iframe src="https://www.youtube.com/embed/${ytId}" frameborder="0" allowfullscreen></iframe></div>`;
                        } else {
                            mediaHtml = `<div class="media-container"><img src="${mediaLink}" alt="News Media"></div>`;
                        }
                    }

                    // "यो पनि पढ्नुहोस" (नयाँ समाचार सधैँ माथि आउने रिभर्स अर्डर)
                    let suggestionsHtml = '';
                    let count = 0;
                    for (let i = rows.length - 1; i >= 1; i--) {
                        if (i === newsId) continue;
                        const row = rows[i];
                        if (row && row[1] && row[1].trim()) {
                            suggestionsHtml += `<a href="news-detail.html?id=${i}" class="suggested-item"><i class="fa-solid fa-chevron-right" style="font-size:0.8rem; color:#ffd700;"></i> ${row[1].trim()}</a>`;
                            count++;
                            if (count >= 4) break;
                        }
                    }

                    container.innerHTML = `
                        <span class="news-date"><i class="fa-regular fa-clock"></i> ${date}</span>
                        <h1>${title}</h1>
                        ${mediaHtml}
                        <div class="news-content">${desc}</div>
                        
                        <section class="suggestions-section">
                            <h3>यो पनि पढ्नुहोस</h3>
                            ${suggestionsHtml || '<p style="color:#666;">अन्य समाचार उपलब्ध छैन।</p>'}
                        </section>
                    `;
                },
                error: function(err) {
                    console.error(err);
                    container.innerHTML = '<p class="loading-text" style="color:red;">विवरण लोड गर्दा प्राविधिक त्रुटि भयो।</p>';
                }
            });
        }
        document.addEventListener('DOMContentLoaded', loadNewsDetail);
    </script>
</body>
</html>

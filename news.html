<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Portal - ROCK-C Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', Arial, sans-serif; }
        body { background: #0b0b0b; color: #f1f1f1; line-height: 1.6; }
        header { background: rgba(0, 0, 0, 0.9); padding: 15px; text-align: center; border-bottom: 2px solid #ffd700; position: sticky; top: 0; z-index: 100; }
        .logo { max-width: 150px; width: 100%; height: auto; }
        .back-btn { display: inline-block; margin: 20px; padding: 10px 20px; background: #222; color: #ffd700; text-decoration: none; border-radius: 5px; border: 1px solid #ffd700; transition: 0.3s; }
        .back-btn:hover { background: #ffd700; color: #000; }
        
        .portal-container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .news-list-section h1 { color: #ffd700; margin-bottom: 25px; font-size: 2rem; border-left: 4px solid #ffd700; padding-left: 10px; }
        
        .headline-item { background: #141414; border: 1px solid #252525; border-radius: 8px; padding: 15px 20px; margin-bottom: 15px; transition: 0.3s; cursor: pointer; }
        .headline-item:hover { border-color: #ffd700; transform: translateX(5px); }
        .headline-date { color: #888; font-size: 0.85rem; display: block; margin-bottom: 5px; }
        .headline-item h2 { color: #fff; font-size: 1.3rem; font-weight: 600; }
        .headline-item h2:hover { color: #ffd700; }
        
        .sidebar-section h3 { color: #ffd700; margin-bottom: 20px; font-size: 1.5rem; }
        .fb-container { background: #141414; padding: 10px; border-radius: 8px; border: 1px solid #252525; }
        .loading-text { text-align: center; color: #ffd700; padding: 30px; }

        @media (max-width: 900px) {
            .portal-container { grid-template-columns: 1fr; }
            .fb-container { display: flex; justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <img src="ROCK C MEDIA SOLUTION NEW LOGO.png" alt="ROCK-C Media Solution" class="logo">
    </header>

    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

    <div class="portal-container">
        <section class="news-list-section">
            <h1>मुख्य समाचारहरू</h1>
            <div id="headlines-container">
                <p class="loading-text"><i class="fas fa-spinner fa-spin"></i> समाचार लोड हुँदैछ...</p>
            </div>
        </section>

        <aside class="sidebar-section">
            <h3>फेसबुक अपडेट</h3>
            <div class="fb-container">
                <div class="fb-page" data-href="https://www.facebook.com/Rockcmedia" data-tabs="timeline" data-width="500" data-height="600" data-small-header="false" data-adapt-container-width="true" data-hide-cover="false" data-show-facepile="false">
                    <blockquote lang="en" class="fb-xfbml-parse-ignore"><a href="https://www.facebook.com/Rockcmedia">Loading Facebook Feed...</a></blockquote>
                </div>
            </div>
        </aside>
    </div>

    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/ne_NP/sdk.js#xfbml=1&version=v17.0"></script>

    <script>
        const SPREADSHEET_ID = '1fzL5DzEemQ_BTQgkHFLaCG-7ZjQlEFknZw5SN44gm-Q';
        // नयाँ सुरक्षित CSV लिंक फर्म्याट
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

        function loadHeadlines() {
            const container = document.getElementById('headlines-container');
            
            Papa.parse(url, {
                download: true,
                header: false,
                complete: function(results) {
                    const rows = results.data;
                    let htmlContent = '';

                    // नयाँ न्युज सधैँ माथि देखाउन रिभर्स (Reverse) लुप चलाउने
                    for (let i = rows.length - 1; i >= 1; i--) {
                        const row = rows[i];
                        if (!row || row.length < 2) continue;

                        const date = row[0] ? row[0].trim() : '';
                        const title = row[1] ? row[1].trim() : '';

                        // हेडलाइन खाली छ भने नदेखाउने
                        if (!title) continue;

                        htmlContent += `
                            <div class="headline-item" onclick="window.location.href='news-detail.html?id=${i}'">
                                <span class="headline-date"><i class="fa-regular fa-clock"></i> ${date}</span>
                                <h2>${title}</h2>
                            </div>
                        `;
                    }
                    container.innerHTML = htmlContent || '<p class="loading-text">अहिले कुनै समाचार उपलब्ध छैन।</p>';
                },
                error: function(err) {
                    console.error(err);
                    container.innerHTML = '<p class="loading-text" style="color:red;">समाचार लोड गर्न सकिएन।</p>';
                }
            });
        }
        document.addEventListener('DOMContentLoaded', loadHeadlines);
    </script>
</body>
</html>

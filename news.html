<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>समाचार शाखा - ROCK-C Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', Arial, sans-serif; }
        body { background: #f4f6f9; color: #2c3e50; line-height: 1.6; }
        
        header { 
            background: #ffffff; 
            padding: 15px 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border-bottom: 3px solid #ffd700; 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        .header-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .logo { max-width: 140px; width: 100%; height: auto; }
        .header-title { font-size: 1.5rem; font-weight: 700; color: #111; border-left: 3px solid #ffd700; padding-left: 15px; text-transform: uppercase; }

        .back-btn { display: inline-block; margin: 20px; padding: 10px 20px; background: #ffffff; color: #333; text-decoration: none; border-radius: 5px; border: 1px solid #ccc; font-weight: 600; transition: 0.3s; }
        .back-btn:hover { background: #ffd700; color: #000; border-color: #ffd700; }
        
        .portal-container { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .news-list-section h1 { color: #111; margin-bottom: 25px; font-size: 1.8rem; border-left: 5px solid #ffd700; padding-left: 12px; }
        
        .headline-item { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 15px; transition: 0.3s; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .headline-item:hover { border-color: #ffd700; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.08); background: #fffdf0; }
        .headline-date { color: #7f8c8d; font-size: 0.85rem; display: block; margin-bottom: 8px; }
        .headline-item h2 { color: #2c3e50; font-size: 1.35rem; font-weight: 600; transition: 0.2s; }
        .headline-item:hover h2 { color: #b8860b; }
        
        .sidebar-section h3 { color: #111; margin-bottom: 20px; font-size: 1.4rem; border-left: 4px solid #3b5998; padding-left: 10px; }
        .fb-container { background: #ffffff; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .loading-text { text-align: center; color: #7f8c8d; padding: 30px; font-size: 1.1rem; }

        @media (max-width: 900px) {
            .portal-container { grid-template-columns: 1fr; }
            .fb-container { display: flex; justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <img src="ROCK C MEDIA SOLUTION NEW LOGO.png" alt="ROCK-C Media" class="logo">
            <div class="header-title">समाचार शाखा</div>
        </div>
    </header>

    <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> मुख्य गृहपृष्ठ</a>
    </div>

    <div class="portal-container">
        <section class="news-list-section">
            <h1>मुख्य समाचारहरू</h1>
            <div id="headlines-container">
                <p class="loading-text"><i class="fas fa-spinner fa-spin"></i> समाचार लोड हुँदैछ...</p>
            </div>
        </section>

        <aside class="sidebar-section">
            <h3>फेसबुक अपडेट</h3>
            <div class="fb-container">
                <div class="fb-page" data-href="https://www.facebook.com/Rockcmedia" data-tabs="timeline" data-width="500" data-height="600" data-small-header="false" data-adapt-container-width="true" data-hide-cover="false" data-show-facepile="false">
                    <blockquote lang="en" class="fb-xfbml-parse-ignore"><a href="https://www.facebook.com/Rockcmedia">Loading Facebook Feed...</a></blockquote>
                </div>
            </div>
        </aside>
    </div>

    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/ne_NP/sdk.js#xfbml=1&version=v17.0"></script>

    <script>
        const SPREADSHEET_ID = '1fzL5DzEemQ_BTQgkHFLaCG-7ZjQlEFknZw5SN44gm-Q';
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

        function loadHeadlines() {
            const container = document.getElementById('headlines-container');
            
            Papa.parse(url, {
                download: true,
                header: false,
                complete: function(results) {
                    const rows = results.data;
                    let htmlContent = '';

                    // Google Sheet को २ औं रो (Row 2) बाट समाचार सुरु हुन्छ, त्यसैले i >= 1 राखेको
                    // यसले नयाँ समाचार (तल्लो रो) लाई सधैँ टपमा देखाउँछ
                    for (let i = rows.length - 1; i >= 1; i--) {
                        const row = rows[i];
                        if (!row || row.length < 2) continue;

                        const date = row[0] ? row[0].trim() : '';
                        const title = row[1] ? row[1].trim() : '';

                        if (!title) continue;

                        // अटोमेटिक रूपमा लिङ्क 'news/row_number.html' बन्ने फिक्स
                        htmlContent += `
                            <div class="headline-item" onclick="window.location.href='news/${i}.html'">
                                <span class="headline-date"><i class="fa-regular fa-clock"></i> ${date}</span>
                                <h2>${title}</h2>
                            </div>
                        `;
                    }
                    container.innerHTML = htmlContent || '<p class="loading-text">अहिले कुनै समाचार उपलब्ध छैन।</p>';
                },
                error: function(err) {
                    console.error(err);
                    container.innerHTML = '<p class="loading-text" style="color:red;">समाचार लोड गर्न सकिएन।</p>';
                }
            });
        }
        document.addEventListener('DOMContentLoaded', loadHeadlines);
    </script>
</body>
</html>

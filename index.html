<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK-C Media Solution</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', Arial, sans-serif;
        }

        body {
            background: #0b0b0b;
            color: #f1f1f1;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* हेडर */
        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            max-width: 180px;
            height: auto;
        }

        /* हिरो सेक्सन */
        .hero {
            padding: 100px 20px;
            text-align: center;
            background: linear-gradient(rgba(11, 11, 11, 0.85), rgba(11, 11, 11, 0.85)), url('V%201.1%20FINAL%20BANNER%2015%20AUG%202026.png');
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid #222;
        }

        .hero h1 {
            font-size: 3.5rem;
            color: #ffd700;
            font-weight: 700;
            text-shadow: 0px 4px 10px rgba(255, 215, 0, 0.3);
        }

        .hero p {
            margin-top: 15px;
            font-size: 1.3rem;
            color: #ccc;
            letter-spacing: 1px;
        }

        .cta-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background: #ffd700;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            transition: 0.3s ease;
        }

        .cta-btn:hover {
            background: #fff;
            transform: scale(1.05);
        }

        /* सेक्सनहरू */
        .section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: auto;
        }

        .section h2 {
            text-align: center;
            margin-bottom: 40px;
            color: #ffd700;
            font-size: 2.2rem;
            position: relative;
        }

        .section h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: #ffd700;
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .about-text {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            font-size: 1.1rem;
            color: #ddd;
        }

        /* सर्भिस कार्डहरू */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: #141414;
            padding: 30px 20px;
            border-radius: 12px;
            border: 1px solid #252525;
            text-align: center;
            transition: all 0.3s ease;
        }

        .card i {
            font-size: 2.5rem;
            color: #ffd700;
            margin-bottom: 15px;
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 1.4rem;
            color: #fff;
        }

        .card:hover {
            border-color: #ffd700;
            transform: translateY(-5px);
        }

        /* नयाँ थपिएको: Clickable Expandable Cards CSS */
        .card.expandable {
            cursor: pointer;
        }
        .card.expandable .click-hint {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
            transition: 0.3s;
        }
        .card.expandable:hover .click-hint {
            color: #ffd700;
        }
        .card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            text-align: left;
            margin-top: 0;
        }
        .card.active .card-content {
            margin-top: 20px;
            border-top: 1px dashed #ffd700;
            padding-top: 15px;
        }
        .card-content ul {
            list-style: none;
            padding-left: 10px;
        }
        .card-content li {
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-content li i {
            font-size: 0.9rem;
            color: #ffd700;
            margin-bottom: 0;
        }

        /* सफल्ड अटो-स्लाइडर स्टाइलिङ */
        .slider-wrapper {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid #ffd700;
            background: #141414;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.05);
        }

        .portfolio-slider {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .portfolio-slide {
            min-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .portfolio-slide img {
            width: 100%;
            height: 500px;
            object-fit: contain;
            display: block;
        }

        /* नयाँ थपिएको: News Section CSS */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 850px;
            margin: 0 auto;
        }
        .news-item {
            background: #141414;
            border: 1px solid #252525;
            border-radius: 8px;
            overflow: hidden;
        }
        .news-header {
            background: #1a1a1a;
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .news-header:hover {
            background: #222;
            border-left: 4px solid #ffd700;
        }
        .news-header h3 {
            font-size: 1.1rem;
            color: #fff;
            font-weight: 600;
        }
        .news-header .toggle-icon {
            color: #ffd700;
            transition: transform 0.3s;
        }
        .news-item.active .toggle-icon {
            transform: rotate(180deg);
        }
        .news-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #0f0f0f;
            padding: 0 20px;
        }
        .news-item.active .news-body {
            padding: 20px;
            border-top: 1px solid #252525;
        }
        .news-date {
            font-size: 0.8rem;
            color: #777;
            margin-bottom: 10px;
        }
        .news-text {
            color: #ddd;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .news-ref-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            padding: 8px 18px;
            background: #ffd700;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            border-radius: 4px;
            transition: 0.3s;
        }
        .news-ref-btn:hover {
            background: #fff;
        }

        /* कन्ट्याक्ट */
        .contact-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .contact-box {
            background: #141414;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #252525;
        }

        .contact-box i {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .contact-box p {
            color: #fff;
        }

        .contact-box a {
            color: #fff;
            text-decoration: none;
        }

        .contact-box a:hover {
            color: #ffd700;
        }

        footer {
            background: #000;
            text-align: center;
            padding: 25px;
            border-top: 2px solid #ffd700;
            margin-top: 60px;
            color: #888;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            text-align: center;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            z-index: 100;
        }

        .loading-text {
            text-align: center;
            color: #aaa;
            padding: 50px;
            width: 100%;
        }

        @media(max-width: 768px) {
            .portfolio-slide img {
                height: 300px;
            }
            .hero h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="ROCK C MEDIA SOLUTION NEW LOGO.png" alt="ROCK-C Media Solution" class="logo">
    </header>

    <section class="hero">
        <h1>ROCK-C Media Solution</h1>
        <p>Information • Entertainment • Digital Services</p>
        <a href="#contact" class="cta-btn">Contact Us</a>

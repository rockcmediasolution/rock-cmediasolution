<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK-C Media Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* यहाँ अघिकै CSS यथावत राख्नुहोस् */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', Arial, sans-serif; }
        body { background: #0b0b0b; color: #f1f1f1; line-height: 1.6; scroll-behavior: smooth; }
        header { background: rgba(0, 0, 0, 0.9); padding: 15px; text-align: center; border-bottom: 2px solid #ffd700; position: sticky; top: 0; z-index: 100; }
        .logo { max-width: 180px; width: 100%; height: auto; }
        .hero { padding: 120px 20px; text-align: center; background: linear-gradient(rgba(11, 11, 11, 0.85), rgba(11, 11, 11, 0.85)); background-size: cover; background-position: center; border-bottom: 1px solid #222; }
        .hero h1 { font-size: 3.5rem; color: #ffd700; font-weight: 700; }
        .section { padding: 80px 20px; max-width: 1200px; margin: auto; }
        .section h2 { text-align: center; margin-bottom: 40px; color: #ffd700; font-size: 2.2rem; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #141414; padding: 30px 20px; border-radius: 12px; border: 1px solid #252525; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #ffd700; transform: translateY(-5px); }
        .card-content { max-height: 0; overflow: hidden; transition: 0.3s; text-align: left; }
        .whatsapp-float { position: fixed; bottom: 25px; right: 25px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <header>
        <img src="ROCK C MEDIA SOLUTION NEW LOGO.png" alt="ROCK-C Media Solution" class="logo">
    </header>

    <section class="hero">
        <h1>ROCK-C Media Solution</h1>
        <p>Information • Entertainment • Digital Services</p>
        <a href="#contact" class="cta-btn" style="display:inline-block; margin-top:25px; padding:12px 30px; background:#ffd700; color:#000; text-decoration:none; font-weight:bold; border-radius:25px;">Contact Us</a>
    </section>

    <script src="//code.tidio.co/tibg3q6axqmnj7yjnhda8fu8gjxtspem.js" async></script>

    <script>
        // तपाईंको बाँकी JavaScript कोडहरू यहाँ राख्नुहोस्
        document.addEventListener('DOMContentLoaded', () => {
            console.log("Page Loaded");
        });
    </script>
</body>
</html>

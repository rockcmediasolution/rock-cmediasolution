<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK-C Media Solution</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', Arial, sans-serif;
        }

        body {
            background: #0b0b0b;
            color: #f1f1f1;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* हेडर */
        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            max-width: 180px;
            width: 100%;
            height: auto;
        }

        /* हिरो सेक्सन */
        .hero {
            padding: 120px 20px;
            text-align: center;
            background: linear-gradient(rgba(11, 11, 11, 0.85), rgba(11, 11, 11, 0.85)), url('V%201.1%20FINAL%20BANNER%2015%20AUG%202026.png');
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid #222;
        }

        .hero h1 {
            font-size: 3.5rem;
            color: #ffd700;
            font-weight: 700;
            text-shadow: 0px 4px 10px rgba(255, 215, 0, 0.3);
            line-height: 1.2;
        }

        .hero p {
            margin-top: 15px;
            font-size: 1.3rem;
            color: #ccc;
            letter-spacing: 1px;
        }

        .cta-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background: #ffd700;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            transition: 0.3s ease;
        }

        .cta-btn:hover {
            background: #fff;
            transform: scale(1.05);
        }

        /* सेक्सनहरू */
        .section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: auto;
        }

        .section h2 {
            text-align: center;
            margin-bottom: 40px;
            color: #ffd700;
            font-size: 2.2rem;
            position: relative;
        }

        .section h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: #ffd700;
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .about-text {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            font-size: 1.1rem;
            color: #ddd;
        }

        /* सर्भिस कार्डहरू */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: #141414;
            padding: 30px 20px;
            border-radius: 12px;
            border: 1px solid #252525;
            text-align: center;
            transition: all 0.3s ease;
        }

        .card i {
            font-size: 2.5rem;
            color: #ffd700;
            margin-bottom: 15px;
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 1.4rem;
            color: #fff;
        }

        .card:hover {
            border-color: #ffd700;
            transform: translateY(-5px);
        }

        .card.expandable {
            cursor: pointer;
        }
        .card.expandable .click-hint {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
            transition: 0.3s;
        }
        .card.expandable:hover .click-hint {
            color: #ffd700;
        }
        .card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            text-align: left;
            margin-top: 0;
        }
        .card.active .card-content {
            margin-top: 20px;
            border-top: 1px dashed #ffd700;
            padding-top: 15px;
        }
        .card-content ul {
            list-style: none;
            padding-left: 5px;
        }
        .card-content li {
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-content li i {
            font-size: 0.9rem;
            color: #ffd700;
            margin-bottom: 0;
        }

        /* सफल्ड अटो-स्लाइडर स्टाइलिङ */
        .slider-wrapper {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid #ffd700;
            background: #141414;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.05);
        }

        .portfolio-slider {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .portfolio-slide {
            min-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .portfolio-slide img {
            width: 100%;
            height: 500px;
            object-fit: contain;
            display: block;
        }

        /* कन्ट्याक्ट */
        .contact-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .contact-box {
            background: #141414;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #252525;
            word-wrap: break-word;
        }

        .contact-box i {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .contact-box p {
            color: #fff;
        }

        .contact-box a {
            color: #fff;
            text-decoration: none;
        }
